syntax = "proto3";
package user;
import "google/protobuf/timestamp.proto";
option go_package = "/pkg/user/proto";

service UserService {
  rpc GetUsers(GetUserRequest) returns (GetUserResponse) {}
  rpc GetUserById(GetUserByIDRequest) returns (GetUserByIDResponse) {}
  rpc CreateUser(MutationUserRequest) returns (MutationUserResponse) {}
  rpc UpdateUser(MutationUserRequest) returns(MutationUserResponse) {}
  rpc UpdateUserPassword(MutationUserRequest) returns(MutationUserResponse) {}
  rpc DeleteUser(MutationUserRequest) returns(MutationUserResponse) {}
  rpc GetUserGroupbyRole(GetUserRequest) returns (GetUserGroupByRoleResponse) {}
  rpc ActivateUser(Empty) returns(MutationUserResponse) {}
  rpc UserForgotPassword(ForgotPasswordRequest) returns(MutationUserResponse) {}
  
}

message UserModel {
  string id = 1;  
  bool is_active = 2 [json_name = "is_active"];
  string created_by = 3 [json_name = "created_by"]; 
  google.protobuf.Timestamp created_date = 4 [json_name = "created_date"];
  string modified_by = 5 [json_name = "modified_by"]; 
  google.protobuf.Timestamp modified_date = 6 [json_name = "modified_date"];
  string user_name = 7 [json_name = "user_name"];
  string email = 8 [json_name = "email"];
  string role_id = 9 [json_name = "role_id"];
  string role_description = 10 [json_name = "role_description"];
  string role_code =  11 [json_name = "role_code"];
  string department_id =  12 [json_name = "department_id"];
  string department_name =  13 [json_name = "department_name"];
  string outsource_id =  14 [json_name = "outsource_id"];
  string outsource_name =  15 [json_name = "outsource_name"];
  string location_id =  16 [json_name = "location_id"];
  string location_name =  17 [json_name = "location_name"];
  bool is_status =  18 [json_name = "is_status"];
  string picture =  19 [json_name = "picture"];
  string name = 20 [json_name = "name"];
}

message GetUserRequest {
  int32 skip = 1;
  int32 take = 2;
  string filter = 3;
  string sort = 4;
}

message GetUserByIDRequest {
  string id = 1;
}

message MutationUserRequest {
  string id = 1;  
  bool is_active = 2 [json_name = "is_active"];
  string user_name = 3 [json_name = "user_name"];
  string email = 4 [json_name = "email"];
  string role_id = 5 [json_name = "role_id"];
  string department_id = 6 [json_name = "department_id"];
  string outsource_id = 7 [json_name = "outsource_id"];
  string location_id = 8 [json_name = "location_id"];
  string picture = 9 [json_name = "picture"];
  string picture_name = 10 [json_name = "picture_name"];
  bool is_status = 11 [json_name = "is_status"];
  string name =  12 [json_name = "name"];
  string password =  13 [json_name = "password"];

}

message GetUserResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  repeated UserModel data = 4;
  int32 countData = 5;
}
message GetUserByIDResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  UserModel data = 4;
}
message MutationUserResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  GetUserByIDRequest data = 4;
}

message GetUserGroupByRoleResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  repeated UserRoleModel data = 4;
}

message UserRoleModel {
  string role_code = 1 [json_name = "role_code"];
  string role_description = 2 [json_name = "role_description"];
  int32 count = 3 [json_name = "count"];
}
message Empty {}
message ForgotPasswordRequest {
  string email = 1;
}
