syntax = "proto3";
package mail;
option go_package = "pkg/mail/proto";


service MailService {
  rpc SendEmail(SendEmailRequest) returns (SendEmailResponse) {}
}

message SendEmailRequest {
  repeated string send_to = 1 [json_name="send_to"];
  repeated string cc_to = 2 [json_name="cc_to"];
  string title = 3 [json_name="title"];
  string link_activation = 4 [json_name="link_activation"];
  string param = 5 [json_name="param"];
  EmployeeModel employee = 6 [json_name="employee"];
}

message EmployeeModel {
  string name = 1;
  string email = 2;
  string id = 3;
}


message SendEmailResponse {
  bool success = 1;
  string message = 2;
  int32 errorCode = 3;
}
