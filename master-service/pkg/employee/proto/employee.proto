syntax = "proto3";
package employee;
import "google/protobuf/timestamp.proto";
option go_package = "/pkg/employee/proto";

service EmployeeService {
  rpc GetEmployees(GetEmployeeRequest) returns (GetEmployeeResponse) {}
  rpc GetEmployeesAdvance(GetEmployeeRequest) returns (GetEmployeeResponse) {}
  rpc GetEmployeesAdvanceExport(GetEmployeeRequest) returns (GetEmployeeExportResponse) {}
  rpc GetEmployeeEventListExport(EmployeeEventRequest) returns (GetEmployeeExportResponse) {}
  rpc GetEmployeeById(GetEmployeeByIDRequest) returns (GetEmployeeByIDResponse) {}
  rpc GetEmployeeEventSummary(GetSummaryRequest) returns (GetEmployeeEventSummaryResponse) {}
  rpc GetEmployeeEventList(EmployeeEventRequest) returns (GetEmployeeEventResponse) {}
  rpc GetEmployeeColumnList(EmptyRequest) returns (RecommendationResponse) {}
  rpc GetEmployeeTemplateExport(GetEmployeeTemplateRequest) returns (GetExportResponse) {}
  rpc GetTrainingRecommendation(EmptyRequest) returns (RecommendationResponse) {}
  rpc GetTrainingOrganizerRecommendation(EmptyRequest) returns (RecommendationResponse) {}
  rpc GetEmployeeMinePermitSummary(GetSummaryRequest) returns (GetEmployeeMinePermitSummaryResponse) {}
  rpc GetEmployeeMinePermitList(EmployeeEventRequest) returns (GetEmployeeResponse) {}
  rpc GetEmployeeMinePermitListExport(EmployeeEventRequest) returns (GetExportResponse) {}
  rpc GetEmployeeJobDescriptionsCompetencies(GetEmployeeByIDRequest) returns (GetEmployeeJobDescriptionResponse) {}

  rpc CreateEmployee(MutationEmployeeRequest) returns (MutationEmployeeResponse) {}
  rpc UpdateEmployee(MutationEmployeeRequest) returns(MutationEmployeeResponse) {}
  rpc UpdateEmployeeBulk(EmployeeUploadRequest) returns (MutationEmployeeResponse) {}
  rpc UpdateEmployeeProfile(MutationEmployeeRequest) returns(MutationEmployeeResponse) {}
  rpc UpdateEmployeeContact(MutationEmployeeRequest) returns(MutationEmployeeResponse) {}
  rpc UpdateEmployeePerformance(MutationEmployeePerformanceRequest) returns(MutationEmployeeResponse) {}
  rpc UpdateEmployeeAddress(MutationEmployeeRequest) returns(MutationEmployeeResponse) {}
  rpc UpdateEmployeeEmployment(MutationEmployeeRequest) returns(MutationEmployeeResponse) {}
  rpc UpdateEmployeeWorkExperience(MutationEmployeeWorkExperienceRequest) returns(MutationEmployeeResponse) {}
  rpc UpdateEmployeeTrainingHistory(MutationEmployeeTrainingHistoryRequest) returns(MutationEmployeeResponse) {}
  rpc UpdateEmployeeHealthRecord(MutationEmployeeHealthRecordRequest) returns(MutationEmployeeResponse) {}
  rpc UpdateEmployeeAccount(MutationEmployeeRequest) returns(MutationEmployeeResponse) {}
  rpc UpdateEmployeeDependent(MutationEmployeeDependentRequest) returns(MutationEmployeeResponse) {}
  rpc UpdateEmployeeEmergency(EmergencyModel) returns(MutationEmployeeResponse) {}
  rpc UpdateEmployeeReprimand(MutationEmployeeReprimandRequest) returns(MutationEmployeeResponse) {}
  rpc UpdateEmployeeEducation(MutationEmployeeEducationRequest) returns(MutationEmployeeResponse) {}
  rpc UpdateEmployeeDocument(MutationEmployeeRequest) returns(MutationEmployeeResponse) {}
  rpc UpdateEmployeeJobDescription(MutationEmployeeJobDescriptionRequest) returns(MutationEmployeeResponse) {}
  rpc DeleteEmployee(MutationEmployeeRequest) returns(MutationEmployeeResponse) {}
  rpc DownloadExcelEmployee(GetEmployeeByIDRequest) returns(GetFileResponse) {}
}

