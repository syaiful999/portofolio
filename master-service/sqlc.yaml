version: "2"
sql:
  - engine: "postgresql"
    schema: "database/migrations/"
    queries: "pkg/enum/queries.sql"
    gen:
      go:
        package: "enum"
        out: "pkg/enum"
        emit_prepared_queries: true
        emit_json_tags: true
        json_tags_case_style: "camel"
        emit_empty_slices: true
  - engine: "postgresql"
    schema: "database/migrations/"
    queries: "pkg/user/queries.sql"
    gen:
      go:
        package: "user"
        out: "pkg/user"
        emit_prepared_queries: true
        emit_json_tags: true
        json_tags_case_style: "camel"
        emit_empty_slices: true
