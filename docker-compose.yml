services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: moyo
      POSTGRES_PASSWORD: moyo_secret
      POSTGRES_DB: master_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moyo -d master_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  migrate:
    image: migrate/migrate:latest
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./master-service/database/migrations:/migrations
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://moyo:moyo_secret@postgres:5432/master_db?sslmode=disable",
        "up"
      ]

  master-service:
    build:
      context: ./master-service
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_ADDRESS: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: moyo
      DATABASE_PASSWORD: moyo_secret
      DATABASE_NAME: master_db
      DATABASE_DRIVER: postgre
      CACHE_ADDRESS: redis:6379
      BROKER_ADDRESS: nats:4222
    ports:
      - "8095:8095"
      - "8096:8096"

  gateway-service:
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    depends_on:
      - master-service
      - redis
    environment:
      CACHE_ADDRESS: redis:6379
      MASTER_DATA_SERVICE_HOST: master-service:8096
    ports:
      - "8080:8080"
      - "8081:8081"

volumes:
  postgres_data:
  minio_data:
