
syntax = "proto3";
package reader;
import "google/protobuf/timestamp.proto";
import "proto/google/api/annotations.proto";

import "google/protobuf/wrappers.proto";
option go_package = "proto/authorization/auth";

service AuthService {
  rpc LoginUser(LoginArg) returns (LoginUserResponse) {
    option (google.api.http) = {
        post:"/api/v1/auth/login"
        body:"*"
      };
  }
  rpc ChangePassword(ChangePasswordArg) returns (LoginUserResponse) {
    option (google.api.http) = {
        put:"/api/v1/auth/change-password/{id}"
        body:"*"
      };
  }
}

message LoginArg {
  string username = 1;
  string password = 2;
}

message LogoutArg {
  string id = 1;
}

message ChangePasswordArg {
    string id = 1;
    string newPassword = 2;
    string confirmPassword = 3;
}

//model
message AuthorizationModel {
  string id = 1 [json_name = "id"];  
  string id_role = 2 [json_name = "id_role"];
  string id_menu = 3 [json_name = "id_menu"];
  string menu_code = 4 [json_name = "menu_code"];
  string menu_description = 5 [json_name = "menu_description"];
  string menu_path = 6 [json_name = "menu_path"];
  bool is_writable = 7 [json_name = "is_writable"];
  bool is_readable = 8 [json_name = "is_readable"];  
  string id_parent = 9 [json_name = "id_parent"];
  int32 level = 10 [json_name = "level"];
  repeated AuthorizationModel children = 11 [json_name = "children"];
}

message UserModel {
  string id = 1;  
  bool is_active = 2 [json_name = "is_active"];
  string created_by = 3 [json_name = "created_by"]; 
  google.protobuf.Timestamp created_date = 4 [json_name = "created_date"];
  string modified_by = 5 [json_name = "modified_by"]; 
  google.protobuf.Timestamp modified_date = 6 [json_name = "modified_date"];
  string user_name = 7 [json_name = "user_name"];
  string email = 8 [json_name = "email"];
  string role_id = 9 [json_name = "role_id"];
  string role_description = 10 [json_name = "role_description"];
  string department_id = 11 [json_name = "department_id"];
  string department_name = 12 [json_name = "department_name"];
  string outsource_id = 13 [json_name = "outsource_id"];
  string outsource_name = 14 [json_name = "outsource_name"];
  string location_id = 15 [json_name = "location_id"];
  string location_name = 16 [json_name = "location_name"];
  bool is_deleted = 17 [json_name = "is_deleted"];
  string picture = 18 [json_name = "picture"];
  repeated AuthorizationModel authorization = 19;
  int32 authorization_count = 20 [json_name = "authorization_count"];
  string fullname  = 21 [json_name = "fullname"];
  string role_code = 22 [json_name = "role_code"];
}

message SuccessLoginResponse {
  bool isAuthenticated = 1;
  google.protobuf.StringValue token = 2;
  UserModel userData = 3;
  bool defaultPassword = 4;
}

message LoginUserResponse {
  bool isError = 1;
  int32 errorCode = 2;
  string errorMessage = 3;
  SuccessLoginResponse data = 4;
}

