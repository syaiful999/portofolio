syntax = "proto3";
package dashboard;
option go_package = "proto/transaction/dashboard";
import "proto/google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

service DashboardService {
  rpc GetDashboardTotalActive(GetDashboardRequest) returns (GetDashboardTotalActiveResponse) {
    option (google.api.http) = {
        post:"/api/v1/transaction/dashboard/total-active"
        body:"*"
      };
  }
  rpc GetDashboardActiveJoinResign(GetDashboardRequest) returns (GetDashboardActiveJoinResignResponse) {
    option (google.api.http) = {
        post:"/api/v1/transaction/dashboard/active-join-resign"
        body:"*"
      };
  }
  rpc GetDashboardAgeInformation(GetDashboardRequest) returns (GetDashboardAgeInformationResponse) {
    option (google.api.http) = {
        post:"/api/v1/transaction/dashboard/age-information"
        body:"*"
      };
  }
  rpc GetDashboardTimeOffTrend(GetDashboardRequest) returns (GetDashboardTimeOffTrendResponse) {
    option (google.api.http) = {
        post:"/api/v1/transaction/dashboard/time-off-trend"
        body:"*"
      };
  }
  rpc GetDashboardJobFamily(GetDashboardRequest) returns (GetDashboardJobFamilyResponse) {
    option (google.api.http) = {
        post:"/api/v1/transaction/dashboard/job-family"
        body:"*"
      };
  }
  rpc GetDashboardEmployeeBreakdown(GetDashboardRequest) returns (GetDashboardEmployeeBreakdownResponse) {
    option (google.api.http) = {
        post:"/api/v1/transaction/dashboard/employee-breakdown"
        body:"*"
      };
  }
  rpc GetDashboardOvertimeDuration(GetDashboardRequest) returns (GetDashboardOvertimeDurationResponse) {
    option (google.api.http) = {
        post:"/api/v1/transaction/dashboard/overtime-duration"
        body:"*"
      };
  }
  rpc GetDashboardEmployeeTimeOff(GetDashboardRequest) returns (GetDashboardEmployeeTimeOffResponse) {
    option (google.api.http) = {
        get:"/api/v1/transaction/dashboard/employee-timeoff"
      };
  }
  rpc GetDashboardTodayAttendance(GetDashboardRequest) returns (GetDashboardTodayAttendanceResponse) {
    option (google.api.http) = {
        post:"/api/v1/transaction/dashboard/today-attendance"
        body:"*"
      };
  }
  rpc GetDashboardAttendanceRecord(GetDashboardRequest) returns (GetDashboardAttendanceRecordResponse) {
    option (google.api.http) = {
      post:"/api/v1/transaction/dashboard/attendance-record"
      body:"*"
    };
  }
  rpc GetDashboardDemography(GetDashboardRequest) returns (GetDashboardDemographyResponse) {
    option (google.api.http) = {
      post:"/api/v1/transaction/dashboard/demography"
      body:"*"
    };
  }
  rpc GetDashboardServiceLength(GetDashboardRequest) returns (GetDashboardServiceLengthResponse) {
    option (google.api.http) = {
      post:"/api/v1/transaction/dashboard/service-length"
      body:"*"
    };
  }
  rpc GetDashboardDetailEmployeeActive(GetDashboardRequest) returns (GetDashboardDetailEmployeeActiveResponse) {
    option (google.api.http) = {
      get:"/api/v1/transaction/dashboard/detail/employee-active"
    };
  }
  rpc GetDashboardDetailOvertimeDuration(GetDashboardRequest) returns (GetDashboardDetailEmployeeActiveResponse) {
    option (google.api.http) = {
      get:"/api/v1/transaction/dashboard/detail/overtime-duration"
    };
  }
  rpc GetDashboardDetailAge(GetDashboardRequest) returns (GetDashboardDetailEmployeeActiveResponse) {
    option (google.api.http) = {
      get:"/api/v1/transaction/dashboard/detail/age"
    };
  }
  rpc GetDashboardDetailAttendance(GetDashboardRequest) returns (GetDashboardDetailAttendanceResponse) {
    option (google.api.http) = {
      get:"/api/v1/transaction/dashboard/detail/attendance"
    };
  }
  rpc GetDashboardDetailTimeOff(GetDashboardRequest) returns (GetDashboardDetailTimeOffResponse) {
    option (google.api.http) = {
      get:"/api/v1/transaction/dashboard/detail/employee-timeoff"
    };
  }

  rpc DownloadAttendanceRecord(GetDashboardRequest) returns (GetFileResponse) {
    option (google.api.http) = {
      get:"/api/v1/transaction/dashboard/download/attendance-record"
    };
  }

  rpc DownloadServiceLength(GetDashboardRequest) returns (GetFileResponse) {
    option (google.api.http) = {
      get:"/api/v1/transaction/dashboard/download/service-length"
    };
  }
  
  rpc DownloadEmployeeBreakdown(GetDashboardRequest) returns (GetFileResponse) {
    option (google.api.http) = {
      get:"/api/v1/transaction/dashboard/download/employee-breakdown"
    };
  }

  rpc DownloadEmployeeTimeOff(GetDashboardRequest) returns (GetFileResponse) {
    option (google.api.http) = {
      get:"/api/v1/transaction/dashboard/download/employee-timeoff"
    };
  }
  
  rpc DownloadJoinResign(GetDashboardRequest) returns (GetFileResponse) {
    option (google.api.http) = {
      get:"/api/v1/transaction/dashboard/download/employee-join-resign"
    };
  }

  rpc DownloadEmployeeActive(GetDashboardRequest) returns (GetFileResponse) {
    option (google.api.http) = {
      get:"/api/v1/transaction/dashboard/download/employee-active"
    };
  }

  rpc GetDownloadLogs(GetDashboardRequest) returns (GetDownloadLogsResponse) {
    option (google.api.http) = {
      get:"/api/v1/transaction/dashboard/download/logs"
    };
  }
}


message GetDashboardRequest {
  int32 skip = 1;
  int32 take = 2;
  string filter = 3;
  string sort = 4;

  int32 year = 5;
  repeated string outsource_id = 6;
  repeated string department_id = 7;
  int32 month = 8;
  string employee_id = 9;
  string age_range = 10;
  string enum_id  = 11;

}

message GetDashboardEmployeeTimeOffRequest {
  int32 skip = 1;
  int32 take = 2;
  string employee_name = 3;
  repeated string outsource_id = 4;
  repeated string department_id = 5;
}

message GetDashboardTotalActiveResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  repeated TotalActiveModel data = 4;
}
message GetDashboardActiveJoinResignResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  repeated ActiveJoinResignModel data = 4;
}
message GetDashboardAgeInformationResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  repeated AgeInformationModel data = 4;
}

message GetDashboardTimeOffTrendResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  repeated TimeOffStatusAbesnce data = 4;
}

message GetDashboardEmployeeBreakdownResponse { 
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  repeated EmployeeBreakdownModel data = 4;
}

message GetDashboardOvertimeDurationResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  repeated OvertimeDurationModel data = 4;
}

message GetDashboardEmployeeTimeOffResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  repeated EmployeeTimeOffModel data = 4;
  int32 countData = 5;
}
message GetDashboardTodayAttendanceResponse{  
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  TodayAttendanceModel data = 4;
}

message GetDashboardAttendanceRecordResponse{
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  repeated TodayAttendanceModel data = 4;
}

message GetDashboardDemographyResponse{
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  DemographyModel data = 4;
}

message GetDashboardServiceLengthResponse{
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  repeated ServiceLengthModel data = 4;
}

message GetDashboardDetailEmployeeActiveResponse{
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  repeated EmployeeData data = 4;
  int32 countData = 5;
}

message GetDashboardDetailAttendanceResponse{
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  repeated EmployeeAttendance data = 4;
  int32 countData = 5;
}

message GetDashboardDetailTimeOffResponse{
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  repeated EmployeeTimeOffDetail data = 4;
}

message TodayAttendanceModel {
  int32 series = 1 [json_name="series"];
  string month = 2 [json_name="month"];
  int32 total_employee = 3 [json_name="total_employee"];
  int32 total_ontime = 4 [json_name="total_ontime"];
  int32 total_latein = 5 [json_name="total_latein"];
  int32 total_checkin = 6 [json_name="total_checkin"];
  int32 total_no_checkin = 7 [json_name="total_no_checkin"];
  int32 total_absent = 8 [json_name="total_absent"];
  int32 total_timeoff = 9 [json_name="total_timeoff"];
  int32 total_dayoff = 10 [json_name="total_dayoff"];
  int32 total_early_out = 11 [json_name="total_early_out"];
}

message DemographyModel {
  GenderModel gender = 1;
  ProvinsiModel provinsi = 2;
  KabupatenModel kabupaten = 3;
  WilayahModel wilayah = 4; 
}

message ServiceLengthModel {
  string service_category = 1 [json_name="service_category"];
  int32 total = 2 [json_name="total"];
}

message GenderModel {
  int32 male = 1 [json_name = "male"];
  int32 female = 2 [json_name = "female"];
}

message ProvinsiModel {
  int32 kaltim = 1 [json_name = "kaltim"];
  int32 luar_kaltim = 2 [json_name = "luar_kaltim"];
  int32 others = 3 [json_name = "others"];
}

message KabupatenModel {
  int32 paser = 1 [json_name = "paser"];
  int32 luar_paser = 2 [json_name = "luar_paser"];
  int32 others = 3 [json_name = "others"];
}

message WilayahModel {
  int32 ring_1 = 1 [json_name = "ring_1"];
  int32 penyangga_luar = 2 [json_name = "penyangga_luar"];
  int32 wilayah_luar = 3 [json_name = "wilayah_luar"];
  int32 others = 4 [json_name = "others"];
}

message GetDashboardJobFamilyResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  repeated JobFamilyModel data = 4;
}

message Fields {
  string label  = 1;
  string field = 2;
}

message TotalActiveModel {
  string month = 1;
  int32 current_year = 2;
  int32 past_year = 3;
}
message ActiveJoinResignModel {
  string month = 1;
  int32 total_resign = 2;
  int32 total_join = 3;
}

message JobFamilyModel {
  string position_name = 1;
  int32 total = 2;
  double percentage = 3;
} 

message EmployeeTimeOffModel {
  string employee_id = 1 [json_name = "employee_id"];
  string employee_nik = 2 [json_name = "employee_nik"];
  string employee_name = 3 [json_name = "employee_name"];
  string employee_position = 4 [json_name = "employee_position"];
  string employee_picture = 5 [json_name = "employee_picture"];
  int32 total_this_month = 6 [json_name = "total_this_month"];
  int32 total_last_month = 7 [json_name = "total_last_month"];
}
message EmployeeBreakdownModel {
  string position_name = 1;
  int32 total_past_year = 2;
  int32 total_current_year = 3;
}

message OvertimeDurationModel {
  string id = 1;
  string label = 2;
  repeated OvertimeDurationDetail data = 3;
}

message OvertimeDurationDetail {
  string series = 1;
  int32 overtime = 2 [json_name = "overtime"];
  float total_overtime = 3 [json_name = "total_overtime"];
}

message AgeInformationModel {
  string age = 1 [json_name = "age"];
  int32 total = 2 [json_name = "total"];
}

message TimeOffStatusAbesnce {
  string id = 1 [json_name = "id"];
  int32 year = 2 [json_name = "year"];
  string status = 3 [json_name = "status"];
  repeated TimeOffTrendModel time0ff = 4;
}

message TimeOffTrendModel {
  string month = 1 [json_name = "month"];
  int32 total = 2 [json_name = "total"];
}

message EmployeeData {
  string employee_name = 1 [json_name = "employee_name"];
  string employee_nik = 2 [json_name = "employee_nik"];
  string employee_picture = 3 [json_name = "employee_picture"];
  google.protobuf.Timestamp join_date = 4 [json_name = "join_date"];
  string duration = 5 [json_name = "duration"];
  string jabatan = 6 [json_name = "jabatan"];
  int32 overtime = 7 [json_name = "overtime"];
  google.protobuf.Timestamp birthdate = 8 [json_name = "birthdate"];
  int32 age = 9 [json_name = "age"];
  float total_overtime = 10 [json_name = "total_overtime"];
}

message EmployeeAttendance {
  string employee_name = 1 [json_name = "employee_name"];
  string employee_nik = 2 [json_name = "employee_nik"];
  string employee_picture = 3 [json_name = "employee_picture"];
  string jabatan = 4 [json_name = "jabatan"];
  int32 absent = 5 [json_name = "absent"];
  int32 time_off = 6 [json_name = "time_off"];
  int32 late_in = 7 [json_name = "late_in"];
  int32 early_out = 8 [json_name = "early_out"];
  int32 on_time = 9 [json_name = "on_time"];
  int32 no_check_in = 10 [json_name = "no_check_in"];
  float to_minute_late_in = 11 [json_name = "to_minute_late_in"];
  float to_minute_early_out = 12 [json_name = "to_minute_early_out"];
}

message EmployeeTimeOffDetail {
  int32 month_number = 1 [json_name = "month_number"];
  string month = 2 [json_name = "month"];
  repeated  Absence absence = 3;
}

message Absence {
  string field = 1 [json_name = "field"];
  int32 total = 2 [json_name = "total"];
}

message DownloadLogs {
  string id = 1 [json_name = "id"];
  string filename = 2 [json_name = "filename"];
  string filepath = 3 [json_name = "filepath"];
  string menu = 4 [json_name = "menu"];
  string status = 5 [json_name = "status"];
  string message = 6 [json_name = "message"];
  string created_by = 7 [json_name = "created_by"];
  google.protobuf.Timestamp created_date = 8 [json_name = "created_date"];
}

message GetFileResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  string url = 4;
}

message GetDownloadLogsResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  repeated DownloadLogs data = 4;
}
