syntax = "proto3";
package assignment;
import "google/protobuf/timestamp.proto";
import "proto/google/api/annotations.proto";
option go_package = "proto/transaction/assignment";


service AssignmentService {
    rpc GetAssignment(GetAssignmentRequest) returns (GetAssignmentResponse) {
        option (google.api.http) = {
          get: "/api/v1/transaction/assignment"
        };
      }
      
    rpc CreateAssignment(MutationAssignmentRequest) returns (MutationAssignmentResponse) {
        option (google.api.http) = {
          post:"/api/v1/transaction/assignment"
          body:"*"
        };
      }
      
      
    rpc ReplaceAssignment(MutationAssignmentRequest) returns (MutationAssignmentResponse) {
        option (google.api.http) = {
          post:"/api/v1/transaction/assignment-replace"
          body:"*"
        };
      }
      
      
    rpc UpdateAssignment(UpdateAssignmentRequest) returns (MutationAssignmentResponse) {
        option (google.api.http) = {
          put:"/api/v1/transaction/assignment/{id}"
          body:"*"
        };
      }
      
    rpc DeleteAssignment(UpdateAssignmentRequest) returns (MutationAssignmentResponse) {
        option (google.api.http) = {
          delete:"/api/v1/transaction/assignment/{id}"
        };
      }
      
    rpc DeleteAssignmentMultiple(DeleteMultiAssignmentRequest) returns (MutationAssignmentResponse) {
        option (google.api.http) = {
          put:"/api/v1/transaction/assignment/delete"
          body:"*"
        };
      }
      
      rpc CreateAssignmentTemplate(MutationAssignmentTemplateRequest) returns (MutationAssignmentResponse) {
        option (google.api.http) = {
          post:"/api/v1/transaction/assignment-template"
          body:"*"
        };
      }
      rpc ReplaceAssignmentTemplate(MutationAssignmentTemplateRequest) returns (MutationAssignmentResponse) {
        option (google.api.http) = {
          post:"/api/v1/transaction/assignment-template-replace"
          body:"*"
        };
      }
      
      rpc UpdateAssignmentTemplate(MutationAssignmentTemplateRequest) returns(MutationAssignmentResponse) {
        option (google.api.http) = {
          put:"/api/v1/transaction/assignment-template/{id}"
          body:"*"
        };
      }
      rpc DeleteAssignmentTemplate(MutationAssignmentTemplateRequest) returns(MutationAssignmentResponse) {
        option (google.api.http) = {
          delete:"/api/v1/transaction/assignment-template/{id}"
        };
      }

      rpc UpdateAssignmentEmployee(UpdateAssignmentEmployeeRequest) returns(MutationAssignmentResponse) {
        option (google.api.http) = {
          put:"/api/v1/transaction/assignment-employee/{id}"
          body:"*"
        };
      }
      rpc DeleteAssignmentEmployee(UpdateAssignmentEmployeeRequest) returns(MutationAssignmentResponse) {
        option (google.api.http) = {
          delete:"/api/v1/transaction/assignment-employee/{id}"
        };
      }

}

message AssignmentModel {
  string id = 1;  
  bool is_active = 2 [json_name = "is_active"];
  string created_by = 3 [json_name = "created_by"]; 
  google.protobuf.Timestamp created_date = 4 [json_name = "created_date"];
  string modified_by = 5 [json_name = "modified_by"]; 
  google.protobuf.Timestamp modified_date = 6 [json_name = "modified_date"];
  string shift_id = 7 [json_name = "shift_id"];
  string shift_template_id = 8 [json_name = "shift_template_id"];
  string shift_name = 9 [json_name = "shift_name"];
  string shift_template_name = 10 [json_name = "shift_template_name"];
  string shift_type = 11 [json_name = "shift_type"];
  string shift_model = 12 [json_name = "shift_model"];
  string shift_start = 13 [json_name = "shift_start"];
  string shift_end = 14 [json_name = "shift_end"];
  string break_start = 15 [json_name = "break_start"];
  string break_end = 16 [json_name = "break_end"];
  int32 auto_overtime = 17 [json_name = "auto_overtime"];
  bool is_overtime = 18 [json_name = "is_overtime"];
  int32 duration = 19 [json_name = "duration"];
  google.protobuf.Timestamp assignment_start = 20 [json_name = "assignment_start"];
  google.protobuf.Timestamp assignment_end = 21 [json_name = "assignment_end"];
  bool is_looping = 22 [json_name = "is_looping"];
  string id_parent = 23 [json_name = "id_parent"];
  repeated EmployeeModel employees = 24 [json_name = "employees"];
}

message EmployeeModel {
  string id = 1;  
  bool is_active = 2 [json_name = "is_active"];
  string created_by = 3 [json_name = "created_by"]; 
  google.protobuf.Timestamp created_date = 4 [json_name = "created_date"];
  string modified_by = 5 [json_name = "modified_by"]; 
  google.protobuf.Timestamp modified_date = 6 [json_name = "modified_date"];
  string employee_name = 7 [json_name = "employee_name"];
  string employee_id = 8 [json_name = "employee_id"];
  string nik = 9 [json_name = "nik"];
  string email = 10 [json_name = "email"];
  string phonenumber = 11 [json_name = "phonenumber"];
  string assignment_id = 12 [json_name = "assignment_id"];
}

message GetAssignmentRequest {
  int32 skip = 1;
  int32 take = 2;
  string filter = 3;
  string sort = 4;
  string employee_name = 5;
}

message GetAssignmentResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  repeated AssignmentModel data = 4;
  int32 countData = 5;
}


message MutationAssignmentTemplateRequest {
  string id = 1;  
  string shift_template_id = 2 [json_name = "shift_template_id"];
  string assignment_start = 3 [json_name = "assignment_start"];
  string assignment_end = 4 [json_name = "assignment_end"];
  bool is_looping = 5 [json_name = "is_looping"];
  repeated EmployeeModel employees = 6 [json_name = "employees"];
}

message UpdateAssignmentRequest {
  string id = 1 [json_name = "id"];
  string shift_id = 2 [json_name = "shift_id"];
  string assignment_start = 3 [json_name = "assignment_start"];
  string assignment_end = 4 [json_name = "assignment_end"];
  repeated EmployeeModel employees = 5 [json_name = "employees"];
}


message DeleteMultiAssignmentRequest {
  repeated AssignmentModel assignment = 1 [json_name = "assignment"];
}


message UpdateAssignmentEmployeeRequest {
  string id = 1 [json_name = "id"];
  string assignment_id = 2 [json_name = "assignment_id"];
  string employee_id = 3 [json_name = "employee_id"];
}

message MutationAssignmentRequest {
  string id = 1 [json_name = "id"];
  repeated ShiftRequest shifts = 2 [json_name = "shifts"];
  repeated EmployeeModel employees = 3 [json_name = "employees"];
}
message ShiftRequest {
  string id = 1;  
  string shift_name = 2 [json_name = "shift_name"];
  string assignment_start = 3 [json_name = "assignment_start"];
  string assignment_end = 4 [json_name = "assignment_end"];

}
message MutationAssignmentResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  AssignmentByIDResponse data = 4;
  repeated EmployeeModel employees = 5 [json_name = "employees"];
}

message AssignmentByIDResponse {
  string id = 1;
}