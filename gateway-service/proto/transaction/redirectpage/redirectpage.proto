syntax = "proto3";
package redirectpage;
import "proto/google/api/annotations.proto";
option go_package = "proto/transaction/redirectpage";

service RedirectPageService {
    rpc CheckRedirectPage(MessageRequest) returns (MessageResponse) {
        option (google.api.http) = {
          get: "/api/v1/transaction/redirect-page/{id}"
        };
      }
      
    rpc CreateRedirectPage(MessageRequest) returns (MessageResponse) {
        option (google.api.http) = {
          post:"/api/v1/transaction/redirect-page"
          body:"*"
        };
      }
}


message MessageRequest {
  string id = 1;
}

message MessageResponse {
  bool isError = 1;
  int32 errorCode = 2;
  string errorMessage = 3;
}
