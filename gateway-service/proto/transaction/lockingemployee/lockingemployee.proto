syntax = "proto3";
package lockingemployee;
import "google/protobuf/timestamp.proto";
import "proto/google/api/annotations.proto";
option go_package = "proto/transaction/lockingemployee";

service LockingEmployeeService {
    rpc GetLockingEmployees(GetLockingEmployeeRequest) returns (GetLockingEmployeeResponse) {
        option (google.api.http) = {
          get: "/api/v1/transaction/locking-employee"
        };
      }
      rpc GetLockingEmployeeById(GetLockingEmployeeByIDRequest) returns (GetLockingEmployeeByIDResponse) {
        option (google.api.http) = {
          get: "/api/v1/transaction/locking-employee/{id}"
        };
      }
    rpc CreateLockingEmployee(MutationLockingEmployeeRequest) returns (MutationLockingEmployeeResponse) {
        option (google.api.http) = {
          post:"/api/v1/transaction/locking-employee"
          body:"*"
        };
      }
      rpc UpdateLockingEmployee(MutationLockingEmployeeRequest) returns(MutationLockingEmployeeResponse) {
        option (google.api.http) = {
          put:"/api/v1/transaction/locking-employee/{id}"
          body:"*"
        };
      }
      rpc DeleteLockingEmployee(MutationLockingEmployeeRequest) returns(MutationLockingEmployeeResponse) {
        option (google.api.http) = {
          delete:"/api/v1/transaction/locking-employee/{id}"
        };
      }
      rpc GetDownloadTemplate(GetLockingEmployeeByIDRequest) returns(GetFileResponse) {
        option (google.api.http) = {
          get:"/api/v1/transaction/locking-employee/template"
        };
      }
      rpc LockingEmployeeUpload(LockingEMployeeUploadRequest) returns (LockingEmployeeUploadResponse) {
        option (google.api.http) = {
          post:"/api/v1/transaction/locking-employee/upload"
          body:"*"
        };
      }
}

message LockingEmployeeModel {
  string id = 1;  
  string employee_id = 2 [json_name = "employee_id"];
  string employee_name = 3 [json_name = "employee_name"];
  string nik = 4 [json_name = "nik"];
  string reader_id = 5 [json_name = "reader_id"];
  string reader_name = 6 [json_name = "reader_name"];
  string location_id = 7 [json_name = "location_id"];
  string location_name = 8 [json_name = "location_name"];
  string created_by = 9 [json_name = "created_by"];
  google.protobuf.Timestamp created_date = 10 [json_name = "created_date"];
  string modified_by = 11 [json_name = "modified_by"];
  google.protobuf.Timestamp modified_date = 12 [json_name = "modified_date"];
  string fr_name = 13 [json_name = "fr_name"];
  string fr_ip = 14 [json_name = "fr_ip"];
}


message GetLockingEmployeeRequest {
  int32 skip = 1;
  int32 take = 2;
  string filter = 3;
  string sort = 4;
}

message GetLockingEmployeeByIDRequest {
  string id = 1;
}

message LockingEMployeeUploadRequest {
  string filename = 1;
}

message MutationLockingEmployeeRequest {  
  string id = 1;  
  string reader_id = 2 [json_name = "reader_id"];
  string employee_id = 3 [json_name = "employee_id"];
}

message GetLockingEmployeeResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  repeated LockingEmployeeModel data = 4;
  int32 countData = 5;
}
message GetLockingEmployeeByIDResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  LockingEmployeeModel data = 4;
}
message MutationLockingEmployeeResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  GetLockingEmployeeByIDRequest data = 4;
}

message GetFileResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  string url = 4;
}

message LockingEmployeeUploadResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  string message = 4;
}
