syntax = "proto3";
package timecard;
import "google/protobuf/timestamp.proto";
import "proto/google/api/annotations.proto";
option go_package = "proto/transaction/timecard";

service TimecardService {
  rpc GetTimecardDaily(GetTimecardRequest) returns (GetTimecardResponse) {
    option (google.api.http) = {
        get: "/api/v1/transaction/timecard/daily"
      };
  }
  rpc GetTimecardWeekly(GetTimecardWeeklyRequest) returns (GetTimecardWeeklyResponse) {
    option (google.api.http) = {
        get: "/api/v1/transaction/timecard/weekly"
      };
  }
  rpc GetTimecardMonthly(GetTimecardMonthlyRequest) returns (GetTimecardMonthlyResponse) {
    option (google.api.http) = {
      get: "/api/v1/transaction/timecard/monthly"
    };
  }
  rpc GetTotalTimeCard(GetTotalRequest) returns (GetTotalResponse) {
    option (google.api.http) = {
      get: "/api/v1/transaction/timecard/total"
    };
  }
  rpc GetTimecardPreviewEmployee(GetTimecardPreviewRequest) returns (GetTimecardPreviewResponse) {
    option (google.api.http) = {
        get: "/api/v1/transaction/timecard/preview/employee"
      };
  }
  rpc GetTimecardPreviewDepartment(GetTimecardPreviewRequest) returns (GetTimecardPreviewDepartmentResponse) {
    option (google.api.http) = {
        get: "/api/v1/transaction/timecard/preview/department"
      };
  }
  rpc GetTimecardPreviewDepartmentResume(GetTimecardPreviewRequest) returns (GetTimecardPreviewDepartmentResumeResponse) {
    option (google.api.http) = {
        get: "/api/v1/transaction/timecard/preview/department-resume"
      };
  }
}

message TimecardModel {
  string id = 1;
  string employee_id = 2 [json_name = "employee_id"];
  string employee_name = 3 [json_name = "employee_name"];
  string nik = 4 [json_name = "nik"];
  string email = 5 [json_name = "email"];
  string department_id = 6 [json_name = "department_id"];
  string department_name = 7 [json_name = "department_name"];
  string outsource_id = 8 [json_name = "outsource_id"];
  string outsource_name = 9 [json_name = "outsource_name"];
  string shift_id = 10 [json_name = "shift_id"];
  string shift_name = 11 [json_name = "shift_name"];
  google.protobuf.Timestamp date_in = 12 [json_name = "date_in"];
  google.protobuf.Timestamp time_in_actual = 13 [json_name = "time_in_actual"];
  google.protobuf.Timestamp time_in_shift = 14 [json_name = "time_in_shift"];
  google.protobuf.Timestamp adjustment_in = 15 [json_name = "adjustment_in"];
  google.protobuf.Timestamp time_in_final = 16 [json_name = "time_in_final"];
  string location_in_id = 17 [json_name = "location_in_id"];
  string location_in_name = 18 [json_name = "location_in_name"];
  google.protobuf.Timestamp time_out_actual = 19 [json_name = "time_out_actual"];
  google.protobuf.Timestamp time_out_shift = 20 [json_name = "time_out_shift"];
  google.protobuf.Timestamp adjustment_out = 21 [json_name = "adjustment_out"];
  google.protobuf.Timestamp time_out_final = 22 [json_name = "time_out_final"];
  string location_out_id = 23 [json_name = "location_out_id"];
  string location_out_name = 24 [json_name = "location_out_name"];
  string day_status_actual = 25 [json_name = "day_status_actual"];
  string day_status_final = 26 [json_name = "day_status_final"];
  string status_actual_id = 27 [json_name = "status_actual_id"];
  string status_actual = 28 [json_name = "status_actual"];
  string status_final_id = 29 [json_name = "status_final_id"];
  string status_final = 30 [json_name = "status_final"];
  float jam_kerja = 31 [json_name = "jam_kerja"];
  float over_time_actual = 32 [json_name = "over_time_actual"];
  float over_time_final = 33 [json_name = "over_time_final"];
  float total_actual = 34 [json_name = "total_actual"];
  float total_final = 35 [json_name = "total_final"];
  string keterangan = 36 [json_name = "keterangan"];
  string created_by = 37 [json_name = "created_by"];
  google.protobuf.Timestamp created_date = 38 [json_name = "created_date"];
  string modified_by = 39 [json_name = "modified_by"];
  google.protobuf.Timestamp modified_date = 40 [json_name = "modified_date"];
  float total_khk_actual = 41 [json_name = "total_khk_actual"];
  float total_khl_actual = 42 [json_name = "total_khl_actual"];
  int32 tanggal = 43 [json_name = "tanggal"];
  string hari = 44 [json_name = "hari"];
  google.protobuf.Timestamp time_break_in_shift = 45 [json_name = "time_break_in_shift"];
  google.protobuf.Timestamp time_break_out_shift = 46 [json_name = "time_break_out_shift"];
  string status_actual_code = 47 [json_name = "status_actual_code"];
  string status_final_code = 48 [json_name = "status_final_code"];
  repeated Absence absence_status = 49 [json_name = "absence_status"];
}


message TimecardWeeklyModel {
  string id = 1;
  string week = 2 [json_name = "week"];
  string department_id = 3 [json_name = "department_id"];
  string department_name = 4 [json_name = "department_name"];
  string outsource_id = 5 [json_name = "outsource_id"];
  string outsource_name = 6 [json_name = "outsource_name"];
  float total_khk_actual = 7 [json_name = "total_khk_actual"];
  float total_khl_actual = 8 [json_name = "total_khl_actual"];
  google.protobuf.Timestamp start_week = 9 [json_name = "start_week"];
  google.protobuf.Timestamp end_week = 10 [json_name = "end_week"];
  repeated Absence absence_status = 11 [json_name = "absence_status"];
}

message TimecardMonthlyModel {
  string id = 1;
  string monthly = 2 [json_name = "monthly"];
  int32 month_number = 3 [json_name = "month_number"];
  string department_id = 4 [json_name = "department_id"];
  string department_name = 5 [json_name = "department_name"];
  string outsource_id = 6 [json_name = "outsource_id"];
  string outsource_name = 7 [json_name = "outsource_name"];
  float total_khk_actual = 8 [json_name = "total_khk_actual"];
  float total_khl_actual = 9 [json_name = "total_khl_actual"];
  repeated Absence absence_status = 10 [json_name = "absence_status"];
}

message TotalModel {
  int32 total_employee = 1 [json_name = "total_employee"];
  int32 total_on_time = 2 [json_name = "total_on_time"];
  int32 total_late_in = 3 [json_name = "total_late_in"];
  int32 total_no_check_in = 4 [json_name = "total_no_check_in"];
  int32 total_absent = 5 [json_name = "total_absent"];
  int32 total_time_off = 6 [json_name = "total_time_off"];
  int32 total_day_off = 7 [json_name = "total_day_off"];
  int32 total_early_out = 8 [json_name = "total_early_out"];
}



message GetTimecardRequest {
  int32 skip = 1;
  int32 take = 2;
  string filter = 3;
  string sort = 4;
  string type = 5;
  string date = 6;
  string outsource_id = 7;
  string department_id = 8;
}

message GetTimecardWeeklyRequest {
  int32 skip = 1;
  int32 take = 2;
  string filter = 3;
  string sort = 4;
  string type = 5;
  string start_date = 6;
  string end_date = 7;
  string department_id = 8;
}

message GetTimecardMonthlyRequest {
  int32 skip = 1;
  int32 take = 2;
  string filter = 3;
  string sort = 4;
  string type = 5;
  int32 month_number = 6;
  string department_id = 7;
  string date = 8;
}

message GetTimecardPreviewRequest {
  string employee_id = 1;
  string department_id = 2;
  string outsource_id = 3;
  int32 month = 4;
  int32 year = 5;
}

message GetTotalRequest {
  string date = 1;
}

message GetTimecardResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  repeated TimecardModel data = 4;
  int32 countData = 5;
}

message GetTimecardWeeklyResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  repeated TimecardWeeklyModel data = 4;
  int32 countData = 5;
}

message GetTimecardMonthlyResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  repeated TimecardMonthlyModel data = 4;
  int32 countData = 5;
}

message GetTimecardPreviewResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  repeated TimecardModel data = 4;
  repeated HolidayModel holiday = 5;
  Rekapitulasi rekapitulasi = 6;
  Validasi validasi = 7;
  repeated Status status = 8;
  repeated MasterStatus master_status = 9;
  ApprovalSign approval_sign = 10;
}

message TimecardPreview {
  repeated TimecardModel data = 1;
  repeated HolidayModel holiday = 2;
  Rekapitulasi rekapitulasi = 3;
  Validasi validasi = 4;
  repeated Status status = 5;
  repeated MasterStatus master_status = 6;
  ApprovalSign approval_sign = 7;
}

message TimecardPreviewResume {
  int32 no = 1;
  string nik = 2;
  string employee_name = 3;
  string department_name = 4;
  int32 sakit_paid = 5;
  int32 izin_paid = 6;
  int32 alpa_paid = 7;
  int32 cuti_paid = 8;
  int32 tugas_paid = 9;
  int32 sakit_unpaid = 10;
  int32 izin_unpaid = 11;
  int32 alpa_unpaid = 12;
  int32 cuti_unpaid = 13;
  int32 tugas_unpaid = 14;
  int32 missing_data = 15;
  int32 late_in = 16;
  int32 khk = 17;
  int32 khl = 18;
  int32 khk_khl = 19;
  float total_overtime = 20;
}

message GetTimecardPreviewDepartmentResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  repeated TimecardPreview data = 4;
  repeated TimecardPreviewResume  dataResume = 5;

}
message GetTimecardPreviewDepartmentResumeResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  repeated TimecardPreviewResume  data = 4;
}

message HolidayModel {
  string holiday_name = 1;
  string holiday_date = 2;
}
message GetTotalResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  TotalModel data = 4;
}

message Rekapitulasi {
  string total_khk = 1;
  string total_khl = 2;
  string total_khk_khl = 3;
  string total_overtime = 4;
}


message Validasi {
  string total_moyo = 1;
  string total_final = 2;
  string gap_total = 3;
  string total_adjustment = 4;
}

message Status {
  string field = 1;
  string value = 2;
}


message MasterStatus {
  string code = 1;
  string value = 2;
}
message ApprovalSign {
  ApprovalSignValue prepared = 1;
  ApprovalSignValue checked = 2;
  ApprovalSignValue approved = 3;
}

message ApprovalSignValue { 
  string message = 1;
   google.protobuf.Timestamp created_date = 2;
}

message Absence {
  string code = 1;
  string field = 2;
  int32 count = 3;
}
