syntax = "proto3";
package reprimand;
import "proto/google/api/annotations.proto";
option go_package = "proto/transaction/reprimand";
import "google/protobuf/timestamp.proto";

service ReprimandService {
  rpc GetEmployeeReprimandSummary(GetEmployeeReprimandRequest) returns (GetEmployeeReprimandSummaryResponse) {
        option (google.api.http) = {
          get: "/api/v1/transaction/reprimand/summary"
        };
      }
  rpc GetEmployeeReprimandList(GetEmployeeReprimandRequest) returns (GetEmployeeReprimandResponse) {
    option (google.api.http) = {
        get: "/api/v1/transaction/reprimand/list"
      };
  }
  rpc GetEmployeeReprimandDetail(GetEmployeeReprimandRequest) returns (GetEmployeeReprimandResponse) {
    option (google.api.http) = {
        get: "/api/v1/transaction/reprimand/detail/{employee_id}"
      };
  }
  rpc GetEmployeeReprimandListExport(GetEmployeeReprimandRequest) returns (GetEmployeeReprimandExportResponse) {
    option (google.api.http) = {
        get: "/api/v1/transaction/reprimand/excel"
      };
  }
  rpc GetEmployeeReprimandDetailExport(GetEmployeeReprimandRequest) returns (GetEmployeeReprimandExportResponse) {
    option (google.api.http) = {
        get: "/api/v1/transaction/reprimand/excel/{employee_id}"
      };
  }
}

message GetEmployeeReprimandRequest {
  int32 skip = 1;
  int32 take = 2;
  string filter = 3;
  string sort = 4;
  string outsource_id= 5 [json_name = "outsource_id"];
  string devision_id = 6 [json_name="devision_id"];
  string event_type= 7 [json_name = "event_type"];
  string employee_id= 8 [json_name = "employee_id"];
}

message GetEmployeeReprimandSummaryResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  ReprimandSummaryModel data = 4;
}

message ReprimandSummaryModel {
  int32 issued_this_month = 1 [json_name="issued_this_month"];
  int32 all_reprimands = 2 [json_name="all_reprimands"];
  int32 active_reprimands = 3 [json_name="active_reprimands"];
  int32 active_sp = 4 [json_name="active_sp"];
  int32 active_sp1_latest = 5 [json_name="active_sp1_latest"];
  int32 expired_this_month = 6 [json_name="expired_this_month"];
  int32 new_reprimand_while_active = 7 [json_name="new_reprimand_while_active"];
}

message EmptyRequest {}

message GetEmployeeReprimandResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  repeated ReprimandModel data = 4; 
  int32 countData = 5;
}

message ReprimandModel{
    string nik = 1 [json_name="nik"];
    string employee_id = 2 [json_name="employee_id"];
    string employee_name = 3 [json_name="employee_name"];
    string department_id = 4 [json_name="department_id"];
    string department_name = 5 [json_name="department_name"];
    string outsource_id = 6 [json_name="outsource_id"];   
    string outsource_name = 7 [json_name="outsource_name"];   
    string reprimand = 8 [json_name="reprimand"];   
    google.protobuf.Timestamp start_date = 9 [json_name = "start_date"];
    google.protobuf.Timestamp end_date = 10 [json_name = "end_date"];
    string document_number = 11 [json_name="document_number"];
    string description = 12 [json_name="description"];
    string atttachment_url = 13 [json_name="attachment_url"];
}

message GetEmployeeReprimandExportResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  ExportResponse data = 4;
}
message ExportResponse {
  bytes file_content = 1; 
  string file_name = 2;   
  string mime_type = 3;   
}