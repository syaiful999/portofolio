syntax = "proto3";
package adjustment;
import "google/protobuf/timestamp.proto";
import "proto/google/api/annotations.proto";
option go_package = "proto/transaction/adjustment";


service AdjustmentService {
  rpc GetAdjustments(GetAdjustmentRequest) returns (GetAdjustmentResponse) {
    option (google.api.http) = {
      get: "/api/v1/transaction/adjustment"
    };
  }
  rpc AdjustmentUpload(AdjustmentUploadRequest) returns (GetAdjustmentResponse) {
      option (google.api.http) = {
      post:"/api/v1/transaction/adjustment/upload"
      body:"*"
    };
  }
}
  



message AdjustmentModel {
  string id = 1;  
  bool is_active = 2 [json_name = "is_active"];
  string created_by = 3 [json_name = "created_by"]; 
  google.protobuf.Timestamp created_date = 4 [json_name = "created_date"];
  string modified_by = 5 [json_name = "modified_by"]; 
  google.protobuf.Timestamp modified_date = 6 [json_name = "modified_date"];
  google.protobuf.Timestamp adjustment_date = 7 [json_name = "adjustment_date"];
  string employee_id = 8 [json_name = "employee_id"];
  string nik = 9 [json_name = "nik"];
  string employee_name = 10 [json_name = "employee_name"];
  google.protobuf.Timestamp adjustment_in =  11 [json_name = "adjustment_in"];
  google.protobuf.Timestamp adjustment_out =  12 [json_name = "adjustment_out"];
  string remarks = 13 [json_name = "remarks"];
}


message GetAdjustmentRequest {
  int32 skip = 1;
  int32 take = 2;
  string filter = 3;
  string sort = 4;
}


message GetAdjustmentResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  repeated AdjustmentModel data = 4;
  int32 countData = 5;
}


message AdjustmentUploadRequest {
  string filename = 1;
}