syntax = "proto3";
package logging;
import "proto/google/api/annotations.proto";
option go_package = "proto/transaction/logging";

service LogService {
  rpc GetLogs(LogRequest) returns (LogResponse) {
    option (google.api.http) = {
      get: "/api/v1/transaction/log"
    };
  }
}

message LogRequest {}

message LogData {
  string date = 1;
  string log = 2;
}

message LogResponse {
  repeated LogData logs =1;
}
