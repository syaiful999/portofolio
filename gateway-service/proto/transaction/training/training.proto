syntax = "proto3";
package training;
import "google/protobuf/timestamp.proto";
import "proto/google/api/annotations.proto";
option go_package = "proto/transaction/training";

service TrainingService {
  rpc GetEmployeeTrainingSummary(GetTrainingRequest) returns (GetTrainingSummaryResponse) {
    option (google.api.http) = {
      get: "/api/v1/transaction/employee-training-summary"
    };
  }
  rpc GetEmployeeTraining(GetTrainingRequest) returns (GetTrainingResponse) {
    option (google.api.http) = {
      get: "/api/v1/transaction/employee-training"
    };
  }
  rpc GetEmployeeTrainingExport(GetTrainingRequest) returns (GetExportResponse) {
    option (google.api.http) = {
      get: "/api/v1/transaction/employee-training-export"
    };
  }
  rpc GetEmployeeTrainingDetail(GetTrainingRequest) returns (GetTrainingResponse) {
    option (google.api.http) = {
      get: "/api/v1/transaction/employee-training/{id}"
    };
  }
  rpc GetEmployeeTrainingDetailExport(GetTrainingRequest) returns (GetExportResponse) {
    option (google.api.http) = {
      get: "/api/v1/transaction/employee-training-export/{id}"
    };
  }

  rpc GetTrainingSummary(GetTrainingRequest) returns (GetTrainingSummaryResponse) {
    option (google.api.http) = {
      get: "/api/v1/transaction/training-summary"
    };
  }
  rpc GetTraining(GetTrainingRequest) returns (GetTrainingResponse) {
    option (google.api.http) = {
      get: "/api/v1/transaction/training"
    };
  }
  
  rpc GetTrainingExport(GetTrainingRequest) returns (GetExportResponse) {
    option (google.api.http) = {
      get: "/api/v1/transaction/training-export"
    };
  }
  rpc GetTrainingDetail(GetTrainingRequest) returns (GetTrainingResponse) {
    option (google.api.http) = {
      get: "/api/v1/transaction/training/{training_title}"
    };
  }
  rpc GetTrainingDetailExport(GetTrainingRequest) returns (GetExportResponse) {
    option (google.api.http) = {
      get: "/api/v1/transaction/training-export/{training_title}"
    };
  }
}




message TrainingModel {
  string id= 1 [json_name = "id"] ;
  bool is_active= 2 [json_name = "is_active"];
  string created_by= 3 [json_name = "created_by"];
  google.protobuf.Timestamp created_date= 4 [json_name = "created_date"];
  string modified_by= 5 [json_name = "modified_by"];
  google.protobuf.Timestamp modified_date= 6 [json_name = "modified_date"];
  string training_title= 7 [json_name = "training_title"];
  google.protobuf.Timestamp training_date= 8 [json_name = "training_date"];
  string organizer_name= 9 [json_name = "organizer_name"];
  string certificate_number= 10 [json_name = "certificate_number"];
  string employee_id= 11 [json_name = "employee_id"];
  string training_method= 12 [json_name = "training_method"];
  google.protobuf.Timestamp expiry_date= 13 [json_name = "expiry_date"];
  string cost= 14 [json_name = "cost"];
  string certificate_url= 15 [json_name = "certificate_url"];
  string nik= 16 [json_name = "nik"];
  string employee_name= 17 [json_name = "employee_name"];
  string department_name= 18 [json_name = "department_name"];
  string outsource_name= 19 [json_name = "outsource_name"];
  google.protobuf.Timestamp effective_date= 20 [json_name = "effective_date"];
  string competencies_name= 21 [json_name = "competencies_name"];
  int32 total_training= 22 [json_name = "total_training"];
  int32 total_participant= 23 [json_name = "total_participant"];
  bool status= 24 [json_name = "status"];
}

message GetTrainingRequest {
  int32 skip = 1;
  int32 take = 2;
  string filter = 3;
  string sort = 4;
  string event_type= 5 [json_name = "event_type"] ;
  string id = 6 [json_name="id"];
  string training_title = 7 [json_name="training_title"];
  string division_id = 8 [json_name="division_id"];
  string outsource_id= 9 [json_name = "outsource_id"];
}


message GetTrainingResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  repeated TrainingModel data = 4;
  int32 countData = 5;
}


message GetTrainingSummaryResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  TrainingEventSummaryModel data = 4;
}

message TrainingEventSummaryModel {
  int32 training_expired = 1 [json_name="training_expired"];
  int32 training_active = 2 [json_name="training_active"];
  int32 training_expiry_in_several_month = 3 [json_name="training_expiry_in_several_month"];
  int32 training_ending_this_month = 4 [json_name="training_ending_this_month"];
  int32 training_starting_this_month = 5 [json_name= "training_starting_this_month"];
}

message EmptyRequest {}

message GetExportResponse {
  bool isError = 1;
  string errorMessage = 2;
  int32 errorCode = 3;
  ExportResponse data = 4;
}
message ExportResponse {
  bytes file_content = 1; 
  string file_name = 2;   
  string mime_type = 3;   
}